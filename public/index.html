<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fleet Compass — Control Room</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <!-- Header -->
  <div style="padding: 20px 20px 0; flex-shrink: 0;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
        <path d="M14 5 L20 10 L20 18 L14 23 L8 18 L8 10 Z" stroke="#818cf8" stroke-width="1.5" fill="none"/>
        <circle cx="14" cy="14" r="3" fill="#6366f1"/>
        <path d="M14 11 L14 8 M14 17 L14 20 M11 14 L8 14 M17 14 L20 14" stroke="#6366f1" stroke-width="1.2"/>
      </svg>
      <div>
        <div style="font-size:15px; font-weight:800; letter-spacing:0.12em; color:#e2e8f0; text-transform:uppercase;">Fleet Compass</div>
        <div style="font-size:9px; letter-spacing:0.08em; color:var(--slate-500); text-transform:uppercase;">Control Room v2.4</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:7px; margin-top:10px; margin-bottom:16px; background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); border-radius:20px; padding:5px 12px; width:fit-content;">
      <div class="pulse-dot"></div>
      <span style="font-size:10px; color:var(--green); font-weight:600; letter-spacing:0.08em; text-transform:uppercase;">Live Telemetry Active</span>
    </div>
  </div>

  <div style="padding: 0 16px; flex-shrink:0;">
    <div class="section-label" style="padding-left:4px;">System KPIs</div>
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <div class="kpi-card">
        <div class="kpi-label">Ingestion Rate</div>
        <div class="kpi-value" id="kpi-ingestion">0</div>
        <div class="kpi-sub">pings / sec</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Active Fleet</div>
        <div class="kpi-value" style="color:#a5b4fc;" id="kpi-fleet">10</div>
        <div class="kpi-sub">vehicles online</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Queue Latency</div>
        <div class="kpi-value" style="color:#fbbf24;" id="kpi-latency">0</div>
        <div class="kpi-sub">ms avg</div>
      </div>
    </div>
  </div>

  <div style="padding: 0 16px; flex-shrink:0; margin-bottom:12px;">
    <div class="chart-wrapper">
      <div class="section-label">System Throughput (pings/sec) — 30s window</div>
      <div style="height:110px; position:relative;">
        <canvas id="throughputChart"></canvas>
      </div>
    </div>
  </div>

  <div style="padding: 0 16px 16px; flex: 1; display:flex; flex-direction:column; min-height:0;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <div class="section-label">Telemetry Log</div>
      <div style="display:flex; align-items:center; gap:5px;">
        <div style="width:5px; height:5px; border-radius:50%; background:#4ade80; animation:pulse-ring 2s ease-out infinite;"></div>
        <span style="font-size:10px; color:var(--slate-500); font-family:var(--font-mono);">STDIN/LIVE</span>
      </div>
    </div>
    <div id="terminal">
      <span class="log-dim">// Initializing telemetry stream...</span><br>
    </div>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>
</div>
<script src="./script.js"></script>
</body>
</html>
