services:
  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction
    networks:
      - fleet_network
    restart: unless-stopped

  frontend:
    build:
      context: ./fleet-compass-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: fleet_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api  
    env_file:
      - .env
    networks:
      - fleet_network
    restart: unless-stopped

  api:
    build:
      context: ./fleet-compass-backend
      dockerfile: Dockerfile
    container_name: fleet_nestjs_app
    ports:
      - "${PORT}:${PORT}"
    expose:
      - "3001"
    environment:
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL}
      - ORS_API_KEY=${ORS_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GOOGLE_USER=${GOOGLE_USER}
      - GOOGLE_PASS=${GOOGLE_PASS}
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - fleet_network
    restart: unless-stopped

networks:
  fleet_network:
    driver: bridge
volumes:
  redis_data: