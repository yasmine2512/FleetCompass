
services:
  # 1. The Redis Cache Instance (Used by BullMQ)
  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    ports:
      - "6379:6379"
    networks:
      - fleet_network
    restart: unless-stopped

  # 2. Your NestJS Fleet Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet_nestjs_app
    ports:
      - ${PORT}:${PORT}
    environment:
      - PORT=${PORT}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL}
      - ORS_API_KEY=${ORS_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
    networks:
      - fleet_network
    restart: unless-stopped
    env_file:
      - .env

networks:
  fleet_network:
    driver: bridge